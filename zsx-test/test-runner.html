<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap Blog — 测试运行器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; padding: 24px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 22px; color: #333; }
  .header p { font-size: 13px; color: #999; margin-top: 4px; }
  #report { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
  .loading { text-align: center; padding: 48px; color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1>🧪 Mindmap Blog 测试报告</h1>
  <p>自动生成 — 测试所有前端模块</p>
</div>
<div id="report"><div class="loading">⏳ 运行测试中…</div></div>

<!-- 先加载所有源码模块 -->
<script src="../src/data.js"></script>
<script src="../src/tree-layout.js"></script>
<script src="../src/canvas.js"></script>
<script src="../src/drill-down.js"></script>
<script src="../src/node-panel.js"></script>
<script src="../src/keyboard.js"></script>
<script src="../src/export.js"></script>

<!-- 测试框架和用例 -->
<script src="test-framework.js"></script>
<script src="test-data.js"></script>
<script src="test-layout.js"></script>
<script src="test-export.js"></script>
<script src="test-drilldown.js"></script>

<script>
// 所有测试定义完成后渲染报告
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    TestRunner.renderReport('report');
  }, 100); // 给测试一点时间执行
});
</script>
</body>
</html>
